name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore vKOROBKU.sln

      - name: Build
        run: dotnet build vKOROBKU.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test vKOROBKU.sln --configuration Release --no-build
